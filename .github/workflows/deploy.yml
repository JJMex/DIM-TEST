# .github/workflows/deploy.yml
name: Deploy static content to Pages

on:
  # Se ejecuta automáticamente cada vez que haces un 'push' a la rama main
  push:
    branches: ["main"]
  # Permite ejecutarlo manualmente desde la pestaña de Actions en GitHub
  workflow_dispatch:

# Otorga los permisos necesarios para que GitHub Pages publique el sitio
permissions:
  contents: read
  pages: write
  id-token: write

# Permite que solo un despliegue ocurra a la vez (evita errores)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Trabajo de despliegue
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Subir artefactos (archivos de la web)
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el directorio raíz
          path: '.'
          
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
